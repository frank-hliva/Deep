<!DOCTYPE HTML>
<html lang="sk-SK">
    <head>
        <title>{{App.Title}}</title>
        <link rel="stylesheet" media="screen" href="/css/admin/bundle.css" type="text/css">
        <link rel="shortcut icon" href="{$root}/favicon.ico" type="image/x-icon">
        <meta http-equiv="content-type" content="text/html; charset=utf-8">
        <script type="text/javascript">App = { root: "{{ServerUrl}}" };</script>
        <script src="/js/jquery.min.js" type="text/javascript"></script>
        <script src="/js/jquery.cookie.js" type="text/javascript"></script>
        <script src="/js/admin/admin.js" type="text/javascript"></script>
        {{Head}}
    </head>
    <body>
        <section id="layout">
            <header>
                {{TopNavigation}}
                <nav {% if user.isLoggedIn %}class="logged-in" {% endif %}id="user">
                    {% if user.isLoggedIn %}
                    <a class="active" id="login" href="/sign/out">Odhlásiť</a>
                    <a class="last" href="/user/edit">Účet</a>
                    {% else %}
                    <a id="login" href="/sign/in">Prihlásenie</a>
                    <a class="active last" href="/sign/up">Registrácia</a>
                    {% endif %}
                </nav>
                <div class="cleaner"></div>
            </header>
            <div class="delim"></div>
            <div>
                <div id="side-bar">
                    {{SideNavigation}}
                </div>
                <div id="content">
                    {% if flashMessages %}
                    <div class="flash-messages">
                        {% for message in flashMessages %}
                        <div class="flash-message alert alert-{{Message.Type}}" role="alert">
                            {{Message.Text}}
                        </div>
                        {% endfor %}
                    </div>
                    {% endif %}
                    {% block content %}{% endblock %}
                </div>
                <div class="cleaner"></div>
            </div>
            <div id="footer"><div class="cleaner"></div></div>
        </section>
    </body>
</html>
